// ===== RENDERING =====
const container = document.getElementById('exercises');
const catLabels = { new: "New Topic", weakness: "Weakness", review: "Review" };
const catClasses = { new: "tag-new", weakness: "tag-weakness", review: "tag-review" };
const typeLabels = { write: "Write", predict: "Predict Output", fix: "Fix the Bug", fill: "Fill in the Blank" };
let solved = new Set();

function updateScore() {
  document.getElementById('score-bar').textContent = `Solved: ${solved.size} / ${exercises.length}`;
}

exercises.forEach(ex => {
  const div = document.createElement('div');
  div.className = 'exercise';
  div.id = `ex-${ex.id}`;
  div.innerHTML = `
    <div class="exercise-header">
      <span class="exercise-num">#${ex.id}</span>
      <span class="tag ${catClasses[ex.cat]}">${catLabels[ex.cat]}</span>
      <span class="tag tag-type">${typeLabels[ex.type]}</span>
    </div>
    <div class="description"><strong>${ex.title}</strong>\n\n${ex.desc}</div>
    <textarea id="code-${ex.id}" spellcheck="false"></textarea>
    <div class="buttons">
      <button class="btn btn-verify" id="verify-${ex.id}" disabled onclick="verify(${ex.id})">Verify</button>
      <button class="btn btn-reset" onclick="resetExercise(${ex.id})">Reset</button>
      <span class="result" id="result-${ex.id}"></span>
    </div>
  `;
  container.appendChild(div);
  const saved = localStorage.getItem(`ex-code-${ex.id}`);
  document.getElementById(`code-${ex.id}`).value = saved !== null ? saved : ex.code;
  if (localStorage.getItem(`ex-solved-${ex.id}`)) {
    solved.add(ex.id);
    document.getElementById(`code-${ex.id}`).style.borderColor = '#4ecca3';
    document.getElementById(`result-${ex.id}`).textContent = 'Correct!';
    document.getElementById(`result-${ex.id}`).className = 'result correct';
  }
});

// Tab key + auto-save in textareas
document.querySelectorAll('textarea').forEach(ta => {
  ta.addEventListener('keydown', e => {
    if (e.key === 'Tab') {
      e.preventDefault();
      const start = ta.selectionStart;
      const end = ta.selectionEnd;
      ta.value = ta.value.substring(0, start) + '    ' + ta.value.substring(end);
      ta.selectionStart = ta.selectionEnd = start + 4;
    }
  });
  ta.addEventListener('input', () => {
    localStorage.setItem(ta.id.replace('code-', 'ex-code-'), ta.value);
  });
});

function resetExercise(id) {
  const ex = exercises.find(e => e.id === id);
  document.getElementById(`code-${id}`).value = ex.code;
  document.getElementById(`code-${id}`).style.borderColor = '#333';
  document.getElementById(`result-${id}`).textContent = '';
  document.getElementById(`result-${id}`).className = 'result';
  localStorage.removeItem(`ex-code-${id}`);
  localStorage.removeItem(`ex-solved-${id}`);
  solved.delete(id);
  updateScore();
}

// ===== PYODIDE =====
let pyodide = null;

async function initPyodide() {
  pyodide = await loadPyodide();
  document.getElementById('status').textContent = 'Pyodide loaded — ready to go!';
  document.getElementById('status').className = 'ready';
  document.querySelectorAll('.btn-verify').forEach(btn => btn.disabled = false);
}

async function verify(id) {
  const ex = exercises.find(e => e.id === id);
  const textarea = document.getElementById(`code-${id}`);
  const resultEl = document.getElementById(`result-${id}`);
  const userCode = textarea.value;

  try {
    pyodide.globals.set('__user_code__', userCode);
    await pyodide.runPythonAsync(ex.test);
    textarea.style.borderColor = '#4ecca3';
    resultEl.textContent = 'Correct!';
    resultEl.className = 'result correct';
    solved.add(id);
    localStorage.setItem(`ex-solved-${id}`, '1');
  } catch (e) {
    textarea.style.borderColor = '#e94560';
    resultEl.textContent = 'Incorrect. Try again.';
    resultEl.className = 'result incorrect';
    solved.delete(id);
    localStorage.removeItem(`ex-solved-${id}`);
  }
  updateScore();
}

updateScore();
</script>
<script src="https://cdn.jsdelivr.net/pyodide/v0.27.5/full/pyodide.js"></script>
<script>initPyodide();</script>
